<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- the lamp, before first paint: a chosen mode wins, otherwise the OS's -->
    <script>
      try {
        var m = localStorage.getItem('author-mode')
        if (!m && matchMedia('(prefers-color-scheme: dark)').matches) m = 'dark'
        if (m === 'dark') document.documentElement.dataset.mode = 'dark'
      } catch (e) {}
    </script>
    <script
      async
      src="https://cdn.seline.com/seline.js"
      data-token="e1e42ac49340bf2"
      data-outbound="true"
      data-mask-patterns="['/d/*']"
    ></script>
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>author*</title>
    <meta name="description" content="a quiet place to write — together." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="author*" />
    <meta property="og:title" content="author*" />
    <meta property="og:description" content="a quiet place to write — together." />

    <meta name="twitter:description" content="a quiet place to write — together." />
